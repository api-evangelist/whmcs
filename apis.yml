apis:
  - aid: whmcs:whmcs
    name: WHMCS API
    description: >-
      The WHMCS API provides an interface to perform operations and actions within
      WHMCS from external applications and scripts. It supports 150+ commands for
      client management, order processing, billing, invoice management, domain
      registration and management, support ticket handling, service provisioning,
      OAuth/SSO authentication, and system administration.
