aid: whmcs
name: WHMCS
description: >-
  WHMCS (Web Host Manager Complete Solution) is a leading web hosting automation
  platform that provides billing, client management, support, domain management, and
  provisioning automation for web hosting businesses. It offers a comprehensive API
  with 150+ commands covering clients, orders, invoicing, domains, support tickets,
  and system administration.
type: Index
